name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: philoagents-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: philoagents-api/uv.lock
      - name: Install dev tools
        run: uv sync --frozen --only-group dev
      - name: Check formatting
        run: uv run --no-sync ruff format --check .
      - name: Lint
        run: uv run --no-sync ruff check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: philoagents-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: philoagents-api/uv.lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run --no-sync pytest tests/ -v

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: philoagents-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: philoagents-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        image: [philoagents-api, philoagents-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
